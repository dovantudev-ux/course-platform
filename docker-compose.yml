version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: course-platform-db
    environment:
      POSTGRES_USER: courseadmin
      POSTGRES_PASSWORD: secure_password_2026
      POSTGRES_DB: course_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseadmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: course-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@barneylabs.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
